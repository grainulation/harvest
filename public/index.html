<!DOCTYPE html>
<html lang="en" data-tool="harvest">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>harvest -- retrospective dashboard</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%230a0e1a'/><path d='M32,3.84 L18.18,3.84 C8.04,13.98 8.04,45.52 18.18,60.16 L32,60.16' fill='none' stroke='%23fb923c' stroke-width='1.28' stroke-linecap='round' stroke-linejoin='round'/><text x='32' y='33' text-anchor='middle' dominant-baseline='central' fill='%23fb923c' font-family='-apple-system,system-ui,sans-serif' font-size='24' font-weight='700'>H</text></svg>">
<style>
/* ── grainulation tokens (inline, zero deps) ── */
:root {
  --bg: #0a0e1a; --bg2: #111827; --bg3: #1e293b; --bg4: #334155;
  --fg: #e2e8f0; --fg2: #94a3b8; --fg3: #64748b;
  --border: #1e293b; --border-subtle: rgba(255,255,255,0.08);
  --green: #34d399; --red: #f87171; --blue: #60a5fa; --purple: #a78bfa; --orange: #fb923c; --cyan: #22d3ee;
  --font-sans: -apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;
  --font-mono: 'SF Mono','Cascadia Code','JetBrains Mono','Fira Code',monospace;
  --radius: 8px; --radius-sm: 4px; --radius-lg: 12px;
  --space-xs: 4px; --space-sm: 8px; --space-md: 12px; --space-lg: 16px; --space-xl: 24px; --space-2xl: 32px;
  --transition-fast: 0.1s ease; --transition-base: 0.15s ease;
  /* harvest accent: orange */
  --accent: #fb923c; --accent-light: #fdba74; --accent-dim: rgba(251,146,60,0.10); --accent-border: rgba(251,146,60,0.25);
}
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-sans); background: var(--bg); color: var(--fg);
  font-size: 13px; line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }

/* ── layout ── */
.app { display: flex; flex-direction: column; height: 100vh; }
.topbar {
  padding: var(--space-lg) var(--space-xl);
  background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: var(--space-lg);
  flex-shrink: 0;
}
.topbar h1 { font-size: 15px; font-weight: 600; }
.topbar .tool-badge {
  font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px;
  padding: 2px 6px; border-radius: var(--radius-sm);
  background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-border);
}
.conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.conn-dot.disconnected { background: var(--red); }

/* ── sprint selector ── */
.sprint-selector {
  display: flex; align-items: center; gap: var(--space-sm); margin-left: auto;
}
.sprint-selector select {
  padding: 6px 10px; border-radius: var(--radius);
  background: var(--bg3); border: 1px solid var(--border);
  color: var(--fg); font-size: 12px; font-family: var(--font-sans);
  outline: none; cursor: pointer;
}
.sprint-selector select:focus { border-color: var(--accent-border); }
.refresh-btn {
  padding: 6px 12px; border-radius: var(--radius);
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid var(--accent-border); cursor: pointer;
  font-size: 11px; transition: background var(--transition-fast);
}
.refresh-btn:hover { background: var(--accent-border); }

/* ── dashboard body ── */
.dashboard { flex: 1; overflow-y: auto; padding: var(--space-xl); }

/* ── cards grid ── */
.cards {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: var(--space-lg); margin-bottom: var(--space-xl);
}
.card {
  padding: var(--space-lg); background: var(--bg2);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
}
.card-title {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px;
  color: var(--fg3); margin-bottom: var(--space-md);
}
.card-value { font-size: 28px; font-weight: 700; color: var(--accent); }
.card-sub { font-size: 11px; color: var(--fg2); margin-top: 4px; }

/* ── section panels ── */
.section {
  margin-bottom: var(--space-xl); background: var(--bg2);
  border: 1px solid var(--border); border-radius: var(--radius-lg);
  padding: var(--space-lg);
}
.section-title {
  font-size: 13px; font-weight: 600; margin-bottom: var(--space-lg);
  display: flex; align-items: center; gap: var(--space-sm);
}
.section-title::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── CSS-only bar chart ── */
.bar-chart { display: flex; flex-direction: column; gap: var(--space-sm); }
.bar-row {
  display: flex; align-items: center; gap: var(--space-md);
}
.bar-label {
  width: 100px; text-align: right; font-size: 11px; color: var(--fg2);
  flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.bar-track { flex: 1; height: 20px; background: var(--bg); border-radius: var(--radius-sm); overflow: hidden; }
.bar-fill {
  height: 100%; border-radius: var(--radius-sm);
  transition: width 0.3s ease;
  display: flex; align-items: center; padding-left: 6px;
  font-size: 10px; color: var(--bg); font-weight: 600; min-width: 24px;
}
.bar-count { font-size: 10px; color: var(--fg3); width: 36px; text-align: right; flex-shrink: 0; }

/* bar colors by type */
.bar-fill.constraint { background: #f87171; }
.bar-fill.risk { background: #fb923c; }
.bar-fill.recommendation { background: #60a5fa; }
.bar-fill.factual { background: #34d399; }
.bar-fill.estimate { background: #a78bfa; }
.bar-fill.feedback { background: #fbbf24; }
.bar-fill.unknown { background: var(--bg4); }

/* evidence bars use a gradient scale */
.bar-fill.stated { background: #64748b; }
.bar-fill.web { background: #94a3b8; }
.bar-fill.documented { background: #60a5fa; }
.bar-fill.tested { background: #34d399; }
.bar-fill.production { background: #22d3ee; }

/* ── velocity metrics ── */
.velocity-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: var(--space-lg);
}
.velocity-item { text-align: center; }
.velocity-val { font-size: 22px; font-weight: 700; color: var(--accent); }
.velocity-label { font-size: 10px; color: var(--fg3); text-transform: uppercase; letter-spacing: 0.3px; }

/* ── decay alerts ── */
.decay-list { display: flex; flex-direction: column; gap: var(--space-sm); }
.decay-alert {
  padding: var(--space-md); background: var(--bg);
  border-radius: var(--radius); border-left: 3px solid var(--red);
}
.decay-alert.stale { border-left-color: var(--orange); }
.decay-alert.unresolved { border-left-color: var(--purple); }
.decay-alert .da-header {
  display: flex; align-items: center; gap: var(--space-sm);
  font-size: 11px; color: var(--fg2); margin-bottom: 4px;
}
.decay-alert .da-id { font-family: var(--font-mono); font-size: 10px; color: var(--fg3); }
.decay-alert .da-reason { font-size: 11px; color: var(--fg3); }
.type-badge {
  display: inline-block; padding: 1px 6px; border-radius: var(--radius-sm);
  font-size: 10px; font-weight: 500;
}
.type-badge.constraint { background: rgba(248,113,113,0.15); color: #f87171; }
.type-badge.risk { background: rgba(251,146,60,0.15); color: #fb923c; }
.type-badge.recommendation { background: rgba(96,165,250,0.15); color: #60a5fa; }
.type-badge.factual { background: rgba(52,211,153,0.15); color: #34d399; }
.type-badge.estimate { background: rgba(167,139,250,0.15); color: #a78bfa; }

/* ── empty state ── */
.empty-state {
  text-align: center; padding: 60px var(--space-xl); color: var(--fg3);
}
.empty-state h2 { font-size: 16px; color: var(--fg2); margin-bottom: var(--space-md); }
.empty-state p { font-size: 12px; max-width: 400px; margin: 0 auto; }

/* ── responsive ── */
@media (max-width: 768px) {
  .topbar { flex-wrap: wrap; padding: var(--space-md); }
  .sprint-selector { margin-left: 0; width: 100%; }
  .dashboard { padding: var(--space-lg); }
  .cards { grid-template-columns: repeat(2, 1fr); }
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <h1><svg width="111" height="56" viewBox="0 0 88 48" fill="none" xmlns="http://www.w3.org/2000/svg" style="vertical-align:middle"><path d="M24,2.9 L13.6,2.9 C6.0,10.5 6.0,34.1 13.6,45.1 L24,45.1" stroke="#fb923c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><text x="24" y="24" text-anchor="middle" dominant-baseline="central" fill="#fb923c" font-family="-apple-system,system-ui,sans-serif" font-size="18.2" font-weight="700">H</text><text x="31.0" y="24" dominant-baseline="central" fill="#e8ecf1" font-family="-apple-system,system-ui,sans-serif" font-size="18.2" font-weight="700">arvest</text></svg></h1>
    <span class="tool-badge">retrospective</span>
    <span class="conn-dot" id="connDot"></span>
    <div class="sprint-selector">
      <select id="sprintSelect"><option value="__all">All sprints</option></select>
      <button class="refresh-btn" id="refreshBtn">Refresh</button>
    </div>
  </header>

  <div class="dashboard" id="dashboard">
    <div class="empty-state" id="emptyState">
      <h2>Retrospective Dashboard</h2>
      <p>Point harvest at a directory containing sprint data (claims.json) to begin analysis. Use <code>harvest serve --root /path/to/sprints</code>.</p>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  const API = '';
  let sprints = [];
  let selectedSprint = '__all';

  // ── SSE ──
  function connectSSE() {
    const dot = document.getElementById('connDot');
    const es = new EventSource(API + '/events');
    es.onopen = () => { dot.classList.remove('disconnected'); };
    es.onerror = () => { dot.classList.add('disconnected'); };
    es.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'state') loadSprints();
      } catch {}
    };
  }

  // ── Load sprints ──
  async function loadSprints() {
    try {
      const res = await fetch(API + '/api/sprints');
      const data = await res.json();
      sprints = data.sprints || [];
      renderSprintSelector();
      loadDashboard();
    } catch (err) {
      console.error('Failed to load sprints:', err);
    }
  }

  function renderSprintSelector() {
    const sel = document.getElementById('sprintSelect');
    sel.innerHTML = '<option value="__all">All sprints (' + sprints.length + ')</option>' +
      sprints.map(s => `<option value="${esc(s.name)}"${selectedSprint === s.name ? ' selected' : ''}>${esc(s.name)} (${s.claimCount} claims)</option>`).join('');
  }

  // ── Load dashboard data ──
  async function loadDashboard() {
    const db = document.getElementById('dashboard');
    if (sprints.length === 0) {
      db.innerHTML = '<div class="empty-state"><h2>No Sprints Found</h2><p>No claims.json files found in the root directory. Start harvest with --root pointing to a sprints directory.</p></div>';
      return;
    }

    if (selectedSprint === '__all') {
      await loadFullDashboard();
    } else {
      await loadSprintAnalysis(selectedSprint);
    }
  }

  async function loadFullDashboard() {
    const db = document.getElementById('dashboard');
    db.innerHTML = '<div style="padding:40px;color:var(--fg3);">Analyzing...</div>';

    try {
      const [dashRes, decayRes, calRes] = await Promise.all([
        fetch(API + '/api/dashboard'),
        fetch(API + '/api/decay?days=30'),
        fetch(API + '/api/calibration'),
      ]);
      const dash = await dashRes.json();
      const decayData = await decayRes.json();
      const calData = await calRes.json();

      renderDashboard(dash, decayData.decay, calData.calibration);
    } catch (err) {
      db.innerHTML = `<div style="padding:40px;color:var(--red);">Error: ${esc(err.message)}</div>`;
    }
  }

  async function loadSprintAnalysis(name) {
    const db = document.getElementById('dashboard');
    db.innerHTML = '<div style="padding:40px;color:var(--fg3);">Analyzing...</div>';

    try {
      const res = await fetch(API + '/api/analysis/' + encodeURIComponent(name));
      const data = await res.json();

      // Get decay for this sprint too
      const decayRes = await fetch(API + '/api/decay?days=30');
      const decayData = await decayRes.json();

      renderDashboard({
        sprintCount: 1,
        totalClaims: data.analysis.summary.totalClaims,
        analysis: data.analysis,
        velocity: data.velocity,
      }, decayData.decay, null);
    } catch (err) {
      db.innerHTML = `<div style="padding:40px;color:var(--red);">Error: ${esc(err.message)}</div>`;
    }
  }

  // ── Render dashboard ──
  function renderDashboard(dash, decay, calibration) {
    const db = document.getElementById('dashboard');
    const analysis = dash.analysis;
    const velocity = dash.velocity;

    if (!analysis) {
      db.innerHTML = '<div class="empty-state"><h2>No Data</h2><p>No analysis data available for the selected sprint(s).</p></div>';
      return;
    }

    const summary = analysis.summary || {};
    const velSummary = velocity ? velocity.summary || {} : {};
    const decaySummary = decay ? decay.summary || {} : {};

    let html = '';

    // ── Summary cards ──
    html += '<div class="cards">';
    html += metricCard('Total Sprints', dash.sprintCount, 'sprints analyzed');
    html += metricCard('Total Claims', dash.totalClaims, `${summary.averageClaimsPerSprint || 0} avg per sprint`);
    html += metricCard('Claims/Day', velSummary.avgClaimsPerDay || '--', velSummary.avgDurationDays ? `${velSummary.avgDurationDays}d avg duration` : 'no timing data');
    html += metricCard('Decay Alerts', (decaySummary.staleCount || 0) + (decaySummary.decayingCount || 0) + (decaySummary.unresolvedCount || 0), `${decaySummary.thresholdDays || 30}d threshold`);
    html += '</div>';

    // ── Type distribution chart ──
    html += '<div class="section"><div class="section-title">Claim Type Distribution</div>';
    html += renderBarChart(analysis.typeDistribution || {}, dash.totalClaims, 'type');
    html += '</div>';

    // ── Evidence quality chart ──
    html += '<div class="section"><div class="section-title">Evidence Quality Breakdown</div>';
    html += renderBarChart(analysis.evidenceDistribution || {}, dash.totalClaims, 'evidence');
    html += '</div>';

    // ── Velocity ──
    if (velocity && velocity.sprints && velocity.sprints.length > 0) {
      html += '<div class="section"><div class="section-title">Sprint Velocity</div>';
      html += '<div class="velocity-grid">';
      html += velocityItem(velSummary.avgDurationDays || '--', 'Avg Duration (days)');
      html += velocityItem(velSummary.avgClaimsPerDay || '--', 'Avg Claims/Day');
      html += velocityItem(velSummary.totalStalls || 0, 'Total Stalls');
      html += velocityItem(velSummary.sprintsAnalyzed || 0, 'Sprints Analyzed');
      html += '</div>';
      if (velocity.insight) {
        html += `<div style="margin-top:var(--space-lg);font-size:12px;color:var(--fg2);padding:var(--space-md);background:var(--bg);border-radius:var(--radius);">${esc(velocity.insight)}</div>`;
      }
      html += '</div>';
    }

    // ── Decay alerts ──
    if (decay) {
      const alerts = [
        ...(decay.decaying || []).map(d => ({ ...d, severity: 'decaying' })),
        ...(decay.stale || []).map(d => ({ ...d, severity: 'stale' })),
        ...(decay.unresolved || []).map(d => ({ ...d, severity: 'unresolved' })),
      ];

      html += '<div class="section"><div class="section-title">Decay Alerts (' + alerts.length + ')</div>';
      if (alerts.length === 0) {
        html += '<div style="padding:var(--space-lg);color:var(--fg3);font-size:12px;text-align:center;">No decay detected. Knowledge base looks fresh.</div>';
      } else {
        html += '<div class="decay-list">';
        for (const a of alerts.slice(0, 20)) {
          html += `
            <div class="decay-alert ${a.severity}">
              <div class="da-header">
                <span class="da-id">${esc(a.id || '-')}</span>
                <span class="type-badge ${esc(a.type || '')}">${esc(a.type || '-')}</span>
                ${a.sprint ? `<span style="font-size:10px;color:var(--fg3);">${esc(a.sprint)}</span>` : ''}
                ${a.ageDays !== undefined ? `<span style="font-size:10px;color:var(--fg3);margin-left:auto;">${a.ageDays}d old</span>` : ''}
              </div>
              <div class="da-reason">${esc(a.reason || '')}</div>
            </div>`;
        }
        if (alerts.length > 20) {
          html += `<div style="padding:var(--space-md);color:var(--fg3);font-size:11px;">...and ${alerts.length - 20} more</div>`;
        }
        html += '</div>';
      }
      if (decay.insight) {
        html += `<div style="margin-top:var(--space-lg);font-size:12px;color:var(--fg2);padding:var(--space-md);background:var(--bg);border-radius:var(--radius);">${esc(decay.insight)}</div>`;
      }
      html += '</div>';
    }

    // ── Monocultures ──
    if (analysis.monocultures && analysis.monocultures.length > 0) {
      html += '<div class="section"><div class="section-title">Type Monocultures</div>';
      html += '<div style="font-size:12px;color:var(--fg2);">';
      for (const m of analysis.monocultures) {
        html += `<div style="padding:var(--space-sm) 0;">Sprint <strong>${esc(m.sprint)}</strong>: ${m.ratio}% ${esc(m.dominantType)}</div>`;
      }
      html += '</div></div>';
    }

    db.innerHTML = html;
  }

  // ── Render helpers ──
  function metricCard(title, value, sub) {
    return `<div class="card"><div class="card-title">${esc(title)}</div><div class="card-value">${esc(String(value))}</div><div class="card-sub">${esc(sub)}</div></div>`;
  }

  function velocityItem(val, label) {
    return `<div class="velocity-item"><div class="velocity-val">${esc(String(val))}</div><div class="velocity-label">${esc(label)}</div></div>`;
  }

  function renderBarChart(distribution, total, colorClass) {
    const entries = Object.entries(distribution).sort((a, b) => b[1] - a[1]);
    if (entries.length === 0) return '<div style="color:var(--fg3);font-size:12px;">No data</div>';

    const max = Math.max(...entries.map(([, v]) => v));
    let html = '<div class="bar-chart">';
    for (const [label, count] of entries) {
      const pct = max > 0 ? Math.round(count / max * 100) : 0;
      const cls = colorClass === 'type' ? label : label;
      html += `
        <div class="bar-row">
          <span class="bar-label">${esc(label)}</span>
          <div class="bar-track">
            <div class="bar-fill ${esc(cls)}" style="width:${pct}%">${count}</div>
          </div>
          <span class="bar-count">${total > 0 ? Math.round(count / total * 100) : 0}%</span>
        </div>`;
    }
    html += '</div>';
    return html;
  }

  // ── Events ──
  document.getElementById('sprintSelect').addEventListener('change', (e) => {
    selectedSprint = e.target.value;
    loadDashboard();
  });

  document.getElementById('refreshBtn').addEventListener('click', () => {
    loadSprints();
  });

  // ── Helpers ──
  function esc(s) { const d = document.createElement('div'); d.textContent = String(s || ''); return d.innerHTML; }

  // ── Init ──
  connectSSE();
  loadSprints();
})();
</script>
</body>
</html>
